name: Daily Publish + Refresh + SEO

on:
  schedule:
    - cron: '30 8 * * *'  # 8:30am UTC daily — new post (30 min after opportunitybot)
    - cron: '30 20 * * *' # 8:30pm UTC daily — refresh run
    - cron: '0 23 * * *'  # 11:00pm UTC daily — SEO audit (midnight BST)
    - cron: '30 2 * * *'  # 2:30am UTC daily — freshness sweep (30 min after opportunitybot's)
  workflow_dispatch:       # allow manual trigger from GitHub UI

jobs:
  publish:
    if: github.event.schedule == '30 8 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Publish to Fulloaded
        run: |
          curl --max-time 150 --fail-with-body \
            "https://contents-bot-a-year.vercel.app/api/publish?site=Fulloaded"

  refresh:
    if: github.event.schedule == '30 20 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Fulloaded
        run: |
          curl --max-time 150 --fail-with-body \
            "https://contents-bot-a-year.vercel.app/api/refresh?site=Fulloaded"

  seo:
    if: github.event.schedule == '0 23 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: SEO Audit Fulloaded
        run: |
          curl --max-time 150 --fail-with-body \
            "https://contents-bot-a-year.vercel.app/api/seo?site=Fulloaded"

  freshness:
    if: github.event.schedule == '30 2 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Freshness Sweep Fulloaded
        run: |
          curl --max-time 150 --fail-with-body \
            "https://contents-bot-a-year.vercel.app/api/freshness?site=Fulloaded"
