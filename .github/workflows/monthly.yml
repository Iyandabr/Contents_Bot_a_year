name: Monthly MOT Check

on:
  schedule:
    - cron: '30 6 1 * *'   # 6:30am UTC on the 1st of each month (staggered from opportunitybot-pro)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  mot:
    runs-on: ubuntu-latest
    steps:
      - name: MOT Check Fulloaded
        run: |
          curl --max-time 150 --fail-with-body \
            "https://contents-bot-a-year.vercel.app/api/mot?site=Fulloaded"
